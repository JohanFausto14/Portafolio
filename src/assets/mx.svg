<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 20" width="30" height="20">
  <rect width="10" height="20" fill="#006847"/>
  <rect x="10" width="10" height="20" fill="#fff"/>
  <rect x="20" width="10" height="20" fill="#c8102e"/>
  <!-- Simplified Mexican Coat of Arms (Lightweight SVG) -->
  <g transform="translate(15, 10)">
    <!-- Eagle body & details -->
    <path d="M-2,-2 C-1,-2.5 0,-2.5 1,-2 C1.5,-1.5 1,-0.5 0.5,-0.5 C0,-0.5 -0.5,-1 -1,-1 C-1.5,-1 -1.8,-1.5 -2,-2 Z" fill="#8B5A2B" />
    <path d="M-0.8,-3.2 C-0.8,-3.8 -0.3,-4.2 0.2,-4.2 C0.7,-4.2 1.1,-3.8 1.1,-3.2 C1.1,-2.9 0.8,-2.6 0.2,-2.6 C-0.3,-2.6 -0.8,-2.9 -0.8,-3.2 Z" fill="#A0522D" />
    <path d="M0.8,-3.5 L1.5,-3.2 L0.8,-2.9 Z" fill="#FFD700" />
    <!-- Wings -->
    <path d="M-2.5,-1.5 C-3.5,-2.5 -3,-4.5 -2,-5 C-2,-4 -1.5,-2.5 -1.5,-1.5 Z" fill="#5C4033" />
    <path d="M-0.5,-1.5 C0,-3.5 0.5,-4.5 1,-5 C1.2,-4 1,-2.5 0.5,-1.5 Z" fill="#5C4033" />
    <!-- Snake in beak -->
    <path d="M1.3,-3 C2,-2.5 2.5,-3 2.5,-3.5" fill="none" stroke="#228B22" stroke-width="0.4" stroke-linecap="round" />
    <!-- Cactus (Nopal) -->
    <path d="M-2.2,2 C-1.8,0.8 -1.2,0.5 0,0.5 C1.2,0.5 1.8,0.8 2.2,2 L1.2,2.5 L-1.2,2.5 Z" fill="#3CB371" />
    <path d="M-0.3,0.8 L-0.3,2.2 M0.3,0.8 L0.3,2.2 M-1.2,1.3 L-0.7,1.8 M1.2,1.3 L0.7,1.8" stroke="#2E8B57" stroke-width="0.4" stroke-linecap="round" />
    <!-- Rock / Lake base -->
    <path d="M-3,2.5 C-3,3.5 3,3.5 3,2.5 Z" fill="#708090" />
    <path d="M-2.5,2.6 C-2.5,3.2 2.5,3.2 2.5,2.6 Z" fill="#4682B4" />
    <!-- Garland (Laurel & Oak) -->
    <path d="M-2.5,1.5 C-1.5,3.5 1.5,3.5 2.5,1.5" fill="none" stroke="#C8102E" stroke-width="0.4" />
    <path d="M-2,1.8 C-1,3.2 1,3.2 2,1.8" fill="none" stroke="#006847" stroke-width="0.3" />
  </g>
</svg>